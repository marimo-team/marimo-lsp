name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TEAM: marimo

jobs:
  typescript-lint:
    name: TypeScript / Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for Doppler OIDC
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: marimo-lsp

      - name: Read marimo version
        id: marimo-version
        run: echo "ref=$(cat marimo-lsp/.marimo-version)" >> $GITHUB_OUTPUT

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: marimo-team/marimo
          ref: ${{ steps.marimo-version.outputs.ref }}
          path: marimo

      - name: 🔐 Fetch Doppler secrets
        # Skip on PRs from forks: id-token write is downgraded to read, so OIDC fails.
        # TURBO_TOKEN is optional and tolerates empty.
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: dopplerhq/secrets-fetch-action@cd2efbf9a404504316435873eff298b82f7e0562 # v1.3.0
        id: secrets
        with:
          auth-method: oidc
          doppler-identity-id: ${{ vars.DOPPLER_IDENTITY_ID }}
          doppler-project: marimo-lsp
          doppler-config: dev

      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
        with:
          package_json_file: marimo-lsp/extension/package.json

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: |
            marimo/pnpm-lock.yaml
            marimo-lsp/extension/pnpm-lock.yaml

      - name: Build marimo packages
        env:
          TURBO_TOKEN: ${{ steps.secrets.outputs.TURBO_TOKEN }}
        run: |
          cd marimo
          pnpm turbo run build --filter="./packages/*"

      - name: Check (lint + format)
        run: |
          cd marimo-lsp/extension
          pnpm install
          pnpm check

  typescript-typecheck:
    name: TypeScript / Typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for Doppler OIDC
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: marimo-lsp

      - name: Read marimo version
        id: marimo-version
        run: echo "ref=$(cat marimo-lsp/.marimo-version)" >> $GITHUB_OUTPUT

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: marimo-team/marimo
          ref: ${{ steps.marimo-version.outputs.ref }}
          path: marimo

      - name: 🔐 Fetch Doppler secrets
        # Skip on PRs from forks: id-token write is downgraded to read, so OIDC fails.
        # TURBO_TOKEN is optional and tolerates empty.
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: dopplerhq/secrets-fetch-action@cd2efbf9a404504316435873eff298b82f7e0562 # v1.3.0
        id: secrets
        with:
          auth-method: oidc
          doppler-identity-id: ${{ vars.DOPPLER_IDENTITY_ID }}
          doppler-project: marimo-lsp
          doppler-config: dev

      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
        with:
          package_json_file: marimo-lsp/extension/package.json

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: |
            marimo/pnpm-lock.yaml
            marimo-lsp/extension/pnpm-lock.yaml

      - name: Build marimo packages
        env:
          TURBO_TOKEN: ${{ steps.secrets.outputs.TURBO_TOKEN }}
        run: |
          cd marimo
          pnpm turbo run build --filter="./packages/*"

      - name: Install and typecheck extension
        env:
          TURBO_TOKEN: ${{ steps.secrets.outputs.TURBO_TOKEN }}
        run: |
          cd marimo-lsp/extension
          pnpm install
          # make sure our types are up to date
          node scripts/codegen.mjs
          pnpm turbo typecheck-ci

      - name: Validate marimo CSS variable overrides
        run: node marimo-lsp/extension/scripts/check-css-variables.mjs

  typescript-test:
    name: TypeScript / Test / ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write # required for Doppler OIDC
    strategy:
      matrix:
        # TODO: more platforms
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: marimo-lsp

      - name: Read marimo version
        id: marimo-version
        shell: bash
        run: echo "ref=$(cat marimo-lsp/.marimo-version)" >> $GITHUB_OUTPUT

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: marimo-team/marimo
          ref: ${{ steps.marimo-version.outputs.ref }}
          path: marimo

      - name: 🔐 Fetch Doppler secrets
        # Skip on PRs from forks: id-token write is downgraded to read, so OIDC fails.
        # TURBO_TOKEN is optional and tolerates empty.
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: dopplerhq/secrets-fetch-action@cd2efbf9a404504316435873eff298b82f7e0562 # v1.3.0
        id: secrets
        with:
          auth-method: oidc
          doppler-identity-id: ${{ vars.DOPPLER_IDENTITY_ID }}
          doppler-project: marimo-lsp
          doppler-config: dev

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
        with:
          package_json_file: marimo-lsp/extension/package.json

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: |
            marimo/pnpm-lock.yaml
            marimo-lsp/extension/pnpm-lock.yaml

      - name: Build marimo packages
        env:
          TURBO_TOKEN: ${{ steps.secrets.outputs.TURBO_TOKEN }}
        run: |
          cd marimo
          pnpm --recursive --filter "./packages/*" codegen
          pnpm --recursive --filter "./packages/*" build

      - name: Install and build the extension
        working-directory: marimo-lsp/extension
        env:
          TURBO_TOKEN: ${{ steps.secrets.outputs.TURBO_TOKEN }}
        run: |
          pnpm install
          # make sure our types are up to date
          node scripts/codegen.mjs
          pnpm build
          pnpm embed-sdist

      - name: vitest
        run: pnpm test --coverage
        working-directory: marimo-lsp/extension

      - name: Upload TypeScript coverage
        if: always() && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: typescript-coverage
          path: |
            marimo-lsp/extension/coverage/coverage-summary.json
            marimo-lsp/extension/coverage/lcov.info
          if-no-files-found: warn
          retention-days: 14

      - name: vscode-test (Linux)
        run: xvfb-run -a pnpm test:extension
        working-directory: marimo-lsp/extension
        if: runner.os == 'Linux'
      # TODO: enable for other platforms
      # - name: vscode-test (Non-Linux)
      #  run: pnpm test:extension
      #  working-directory: marimo-lsp/extension
      #  if: runner.os != 'Linux'

  python-lint:
    name: Python / Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - run: |
          uv run ruff format --check
          uv run ruff check

  python-test:
    name: Python / Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - run: uv run pytest --cov --cov-report=term --cov-report=xml:coverage.xml --cov-report=json:coverage.json

      - name: Upload Python coverage
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: python-coverage
          path: |
            coverage.xml
            coverage.json
          if-no-files-found: warn
          retention-days: 14

  python-typecheck:
    name: Python / Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - run: uv run ty check

  coverage-report:
    name: Coverage / Report
    runs-on: ubuntu-latest
    needs: [python-test, typescript-test]
    if: ${{ !cancelled() && github.event_name == 'pull_request' }}
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download Python coverage
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: python-coverage
          path: coverage-artifacts/python
        continue-on-error: true

      - name: Download TypeScript coverage
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: typescript-coverage
          path: coverage-artifacts/typescript
        continue-on-error: true

      - name: Build coverage comment
        id: comment
        run: python3 scripts/coverage_comment.py coverage-artifacts > comment.md

      - name: Post sticky PR comment
        uses: marocchino/sticky-pull-request-comment@52423e01640425a022ef5fd42c6fb5f633a02728 # v2.9.1
        with:
          header: coverage-report
          path: comment.md

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: marimo

jobs:
  typescript-lint:
    name: TypeScript / Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
        with:
          package_json_file: extension/package.json

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: extension/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install
        working-directory: extension

      - name: Run oxlint
        run: pnpm exec oxlint
        working-directory: extension

      - name: Run oxfmt
        run: pnpm exec oxfmt --check .
        working-directory: extension

  typescript-typecheck:
    name: TypeScript / Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: marimo-lsp

      - name: Read marimo version
        id: marimo-version
        run: echo "ref=$(cat marimo-lsp/.marimo-version)" >> $GITHUB_OUTPUT

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: marimo-team/marimo
          ref: ${{ steps.marimo-version.outputs.ref }}
          path: marimo

      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
        with:
          package_json_file: marimo-lsp/extension/package.json

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: |
            marimo/pnpm-lock.yaml
            marimo-lsp/extension/pnpm-lock.yaml

      - name: Build marimo packages
        run: |
          cd marimo
          pnpm turbo run build --filter="./packages/*"

      - name: Install and typecheck extension
        run: |
          cd marimo-lsp/extension
          pnpm install
          # make sure our types are up to date
          node scripts/codegen.mjs
          pnpm turbo typecheck-ci

      - name: Validate marimo CSS variable overrides
        run: node marimo-lsp/extension/scripts/check-css-variables.mjs

  typescript-test:
    name: TypeScript / Test / ${{ matrix.os }}
    strategy:
      matrix:
        # TODO: more platforms
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: marimo-lsp

      - name: Read marimo version
        id: marimo-version
        shell: bash
        run: echo "ref=$(cat marimo-lsp/.marimo-version)" >> $GITHUB_OUTPUT

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: marimo-team/marimo
          ref: ${{ steps.marimo-version.outputs.ref }}
          path: marimo

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
        with:
          package_json_file: marimo-lsp/extension/package.json

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: |
            marimo/pnpm-lock.yaml
            marimo-lsp/extension/pnpm-lock.yaml

      - name: Build marimo packages
        run: |
          cd marimo
          pnpm --recursive --filter "./packages/*" codegen
          pnpm --recursive --filter "./packages/*" build

      - name: Install and build the extension
        working-directory: marimo-lsp/extension
        run: |
          pnpm install
          # make sure our types are up to date
          node scripts/codegen.mjs
          pnpm build
          pnpm embed-sdist

      - name: vitest
        run: pnpm test
        working-directory: marimo-lsp/extension

      - name: vscode-test (Linux)
        run: xvfb-run -a pnpm test:extension
        working-directory: marimo-lsp/extension
        if: runner.os == 'Linux'
      # TODO: enable for other platforms
      # - name: vscode-test (Non-Linux)
      #  run: pnpm test:extension
      #  working-directory: marimo-lsp/extension
      #  if: runner.os != 'Linux'

  python-lint:
    name: Python / Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - run: |
          uv run ruff format --check
          uv run ruff check

  python-test:
    name: Python / Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - run: uv run pytest

  python-typecheck:
    name: Python / Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - run: uv run ty check
